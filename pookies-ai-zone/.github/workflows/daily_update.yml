name: Daily AI Tool Update

on:
  schedule:
    # Run at 06:00 UTC every day
    - cron: '0 6 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  update-db:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Daily Update Pipeline
      env:
        CONVEX_URL: ${{ secrets.CONVEX_URL }}
        PRODUCT_HUNT_API_KEY: ${{ secrets.PRODUCT_HUNT_API_KEY }}
        PRODUCT_HUNT_API_SECRET: ${{ secrets.PRODUCT_HUNT_API_SECRET }}
        PRODUCT_HUNT_ACCESS_TOKEN: ${{ secrets.PRODUCT_HUNT_ACCESS_TOKEN }}
        # Add other secrets if needed (e.g. HUGGING_FACE_TOKEN if you add it later)
      run: |
        python -m auto_update.run_daily --run-now
